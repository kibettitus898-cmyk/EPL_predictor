services:
  - type: web
    name: epl-predictor-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python scripts/train_model.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ODDSPAPI_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
